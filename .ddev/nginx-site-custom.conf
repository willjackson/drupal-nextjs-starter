# Custom nginx site config for the Drupal 11 + Next.js starter.
#
# Installed into /etc/nginx/sites-enabled/nginx-site.conf by the post-start hook
# in .ddev/config.nextjs.yaml (DDEV regenerates the nginx_full file on every
# start, so we keep our config under this unmanaged filename instead).
#
# Mirrors the Docksal routing (.docksal/docksal.yml):
#   - https://<project>.ddev.site         -> Next.js dev server (container port 3000)
#   - https://drupal.<project>.ddev.site  -> Drupal docroot (drupal/web) via PHP-FPM
#
# Start the Next.js dev server with `ddev develop` (mirrors `fin develop`).

# Map for WebSocket upgrade (Next.js / Turbopack HMR). Declared at http context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# Primary host: Next.js frontend (reverse proxy to the dev server on :3000)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen 443 ssl default_server;

    # Root is only used for the /phpstatus healthcheck below.
    root /var/www/html/drupal/web;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    # DDEV healthcheck (/healthcheck, /phpstatus). Kept first so the router's
    # health checks succeed even when the Next.js dev server is not running.
    include /etc/nginx/monitoring.conf;

    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    # Proxy everything else to the Next.js dev server.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;

        # Friendly message if the Next.js dev server has not been started yet.
        error_page 502 504 = @nextjs_down;
    }

    location @nextjs_down {
        default_type text/html;
        return 503 '<html><body style="font-family:sans-serif;max-width:40em;margin:4em auto;"><h1>Next.js dev server is not running</h1><p>Start it with <code>ddev develop</code> (or <code>ddev develop --background</code>), then reload this page.</p><p>Drupal is available at <a href="https://drupal.d11-nextjs-starter.ddev.site">https://drupal.d11-nextjs-starter.ddev.site</a>.</p></body></html>';
    }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}

# ---------------------------------------------------------------------------
# Drupal host: drupal.<project>.ddev.site -> Drupal docroot (drupal/web)
# ---------------------------------------------------------------------------
server {
    server_name ~^drupal\.;

    root /var/www/html/drupal/web;

    listen 80;
    listen 443 ssl;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    index index.php index.htm index.html;

    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    location / {
        absolute_redirect off;
        try_files $uri $uri/ /index.php?$query_string; # For Drupal >= 7
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    # Handle image styles for Drupal 7+
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }

    # pass the PHP scripts to FastCGI server listening on socket
    location ~ '\.php$|^/update.php' {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_intercept_errors off;
        fastcgi_read_timeout 10m;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $fcgi_https;
        fastcgi_pass_header "X-Accel-Buffering";
        fastcgi_pass_header "X-Accel-Charset";
        fastcgi_pass_header "X-Accel-Expires";
        fastcgi_pass_header "X-Accel-Limit-Rate";
        fastcgi_pass_header "X-Accel-Redirect";
    }

    # Prevent clients from accessing hidden files (starting with a dot)
    # Access to `/.well-known/` is allowed.
    location ~* /\.(?!well-known\/) {
        deny all;
    }

    # Prevent clients from accessing to backup/config/source files
    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sh|sql|sw[op])|~)$ {
        deny all;
    }

    ## Regular private file serving (i.e. handled by Drupal).
    location ^~ /system/files/ {
        log_not_found off;
        access_log off;
        expires 30d;
        try_files $uri @rewrite;
    }

    # Media: images, icons, video, audio, HTC
    location ~* \.(jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|webp|htc)$ {
        try_files $uri @rewrite;
        expires max;
        log_not_found off;
    }

    # js and css always loaded
    location ~* \.(js|css)$ {
        try_files $uri @rewrite;
        expires -1;
        log_not_found off;
    }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
